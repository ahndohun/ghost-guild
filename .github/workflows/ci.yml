name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Verify art assets
        run: node scripts/verify-art-assets.mjs
      - name: Python atlas QC
        run: |
          python -m pip install --disable-pip-version-check "Pillow>=10,<13"
          python test/test_assemble_pixellab_atlas.py
          python test/test_build_actor_atlases.py
      - name: Production build
        run: npm run build
      - name: Secret scan committed TestSprite bundles
        # Failure bundles may embed presigned S3 URLs carrying temporary AWS
        # credentials — block the merge if any survived scripts/sanitize-bundles.mjs.
        run: |
          if grep -rEq "ASIA[A-Z0-9]{16}|AKIA[A-Z0-9]{16}|X-Amz-Signature=[A-Za-z0-9]" .testsprite/ 2>/dev/null; then
            echo "::error::Unredacted AWS credential found in .testsprite/ — run 'node scripts/sanitize-bundles.mjs'"
            exit 1
          fi
          echo "no unredacted credentials in .testsprite/"

  e2e:
    # TestSprite cloud E2E against the live deployment.
    # Runs on main pushes whose commit message contains [e2e] (credit control).
    if: github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[e2e]')
    needs: check
    runs-on: ubuntu-latest
    env:
      TESTSPRITE_API_KEY: ${{ secrets.TESTSPRITE_API_KEY }}
      PROJECT_ID: c172d9d5-4d21-4efd-81a7-37e706318152
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @testsprite/testsprite-cli
      - name: Wait for Vercel deploy to go live
        run: sleep 90
      - name: Run TestSprite suite against production
        # FE tests must run individually (`test run --all` is BE-only) —
        # the loop runner handles that and downloads failure bundles.
        run: node scripts/tsloop.mjs github-actions "CI run ${{ github.sha }}"
      - name: Upload failure bundles
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testsprite-failure
          path: ./.testsprite/failure
