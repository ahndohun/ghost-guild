<html lang="en"><head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Guild</title>
    <script type="module" crossorigin="" src="/assets/index-Cbe1V37k.js"></script>
    <style data-original-href="https://ghost-guild.vercel.app/assets/index-M8z1poU6.css">:root { color: rgb(232, 227, 213); font-synthesis: none; text-rendering: geometricprecision; background: rgb(14, 12, 21); font-family: "Press Start 2P", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
* { box-sizing: border-box; }
body { background: radial-gradient(circle at 20% 0px, rgba(184, 69, 63, 0.18), rgba(0, 0, 0, 0) 28rem), linear-gradient(rgb(23, 17, 28) 0%, rgb(14, 12, 21) 52%, rgb(8, 7, 13) 100%); min-width: 320px; min-height: 100dvh; margin: 0px; }
button, input { font: inherit; }
button { color: rgb(232, 227, 213); cursor: pointer; background: rgb(27, 21, 32); border: 2px solid rgba(232, 227, 213, 0.38); min-height: 44px; transition: transform 0.12s, border-color 0.12s, background 0.12s; }
button:hover:not(:disabled), button:focus-visible { background: rgb(42, 28, 42); border-color: rgb(232, 227, 213); outline: none; transform: translateY(-1px); }
button:disabled { cursor: not-allowed; opacity: 0.45; }
.screen { width: min(1120px, 100%); min-height: 100dvh; margin: 0px auto; padding: 24px; }
.hidden { display: none; }
.topbar, .actions { justify-content: space-between; align-items: center; gap: 16px; display: flex; }
.eyebrow { color: rgb(88, 214, 201); letter-spacing: 0px; margin: 0px 0px 10px; font-size: 10px; }
h1, h2, p { margin-top: 0px; }
h1 { margin-bottom: 0px; font-size: clamp(24px, 5vw, 48px); line-height: 1.15; }
h2 { font-size: 16px; }
.gold, .panel, .results-panel { background: rgba(14, 12, 21, 0.84); border: 2px solid rgba(232, 227, 213, 0.24); box-shadow: rgba(0, 0, 0, 0.22) 0px 14px; }
.gold { white-space: nowrap; padding: 14px 16px; }
.guild-layout { grid-template-columns: minmax(260px, 0.9fr) minmax(280px, 1.2fr) minmax(240px, 0.8fr); gap: 16px; margin: 28px 0px; display: grid; }
.panel { padding: 18px; }
.trait-row { grid-template-columns: 92px 1fr 42px; align-items: center; gap: 12px; min-height: 48px; font-size: 12px; display: grid; }
input[type="range"] { accent-color: rgb(88, 214, 201); }
.class-grid, .upgrade-grid { gap: 12px; display: grid; }
.class-grid { grid-template-columns: repeat(3, minmax(0px, 1fr)); }
.class-card { place-items: center; gap: 8px; min-height: 148px; padding: 14px; display: grid; }
.class-card.selected { background: rgb(35, 29, 44); border-color: rgb(88, 214, 201); }
.class-card.locked { border-color: rgba(217, 164, 65, 0.42); }
.class-glyph { color: rgb(14, 12, 21); background: rgb(232, 227, 213); border-radius: 50%; place-items: center; width: 46px; height: 46px; font-size: 18px; display: grid; }
.class-card small { color: rgba(232, 227, 213, 0.72); overflow-wrap: anywhere; text-align: center; max-width: 100%; font-size: 9px; line-height: 1.4; }
.class-status { color: rgb(217, 164, 65); }
.actions { flex-wrap: wrap; }
.actions button, .results-panel button { padding: 12px 18px; }
.primary { color: rgb(255, 244, 207); background: rgb(58, 40, 24); border-color: rgb(217, 164, 65); }
.run-shell { width: min(100%, 960px); margin: 0px auto; position: relative; }
.offline-badge { color: rgb(255, 244, 207); background: rgba(5, 4, 10, 0.86); border: 1px solid rgba(217, 164, 65, 0.72); padding: 8px 10px; font-size: 9px; position: absolute; top: 12px; left: 12px; }
canvas { width: 100%; height: auto; image-rendering: pixelated; background: rgb(14, 12, 21); border: 2px solid rgba(232, 227, 213, 0.32); display: block; }
.hud { flex-wrap: wrap; justify-content: center; gap: 10px; padding: 14px 0px; font-size: 11px; display: flex; }
.hud span { background: rgba(14, 12, 21, 0.86); border: 1px solid rgba(232, 227, 213, 0.24); padding: 8px 10px; }
.results-panel { width: min(780px, 100%); margin: 56px auto 0px; padding: 24px; }
.result-grid { grid-template-columns: repeat(5, minmax(0px, 1fr)); gap: 10px; margin: 22px 0px; display: grid; }
.result-grid div, #result-ranking li, #leaderboard-list li { overflow-wrap: anywhere; background: rgb(23, 17, 28); border: 1px solid rgba(232, 227, 213, 0.22); padding: 12px; line-height: 1.5; }
.result-grid dt { color: rgb(88, 214, 201); margin-bottom: 8px; font-size: 9px; }
.result-grid dd { margin: 0px; font-size: 16px; }
#result-ranking, #leaderboard-list { gap: 8px; padding-left: 0px; list-style: none; display: grid; }
#result-ranking .local-row { color: rgb(255, 255, 255); background: rgb(31, 39, 48); border-color: rgb(88, 214, 201); }
.leaderboard-panel { margin: 24px 0px; }
@media (width <= 860px) {
  .screen { padding: 16px; }
  .topbar { flex-direction: column; align-items: flex-start; }
  .guild-layout, .class-grid, .result-grid { grid-template-columns: 1fr; }
}</style>
  </head>
  <body>
    <div id="app">
    <section id="screen-guild" class="screen">
      <header class="topbar">
        <div>
          <p class="eyebrow">GHOST GUILD</p>
          <h1>Guildmaster Console</h1>
        </div>
        <div class="gold">Gold <span id="gold-amount" data-testid="gold-amount">0</span></div>
      </header>
      <main class="guild-layout">
        <section class="panel">
          <h2>Traits</h2>
          
    <label class="trait-row">
      <span>Bravery</span>
      <input data-testid="trait-bravery" type="range" min="0" max="100" value="50">
      <strong id="trait-bravery-value">50</strong>
    </label>
  
          
    <label class="trait-row">
      <span>Greed</span>
      <input data-testid="trait-greed" type="range" min="0" max="100" value="50">
      <strong id="trait-greed-value">50</strong>
    </label>
  
          
    <label class="trait-row">
      <span>Focus</span>
      <input data-testid="trait-focus" type="range" min="0" max="100" value="50">
      <strong id="trait-focus-value">50</strong>
    </label>
  
        </section>
        <section class="panel">
          <h2>Class</h2>
          <div class="class-grid">
            
    <button type="button" class="class-card selected" data-testid="class-knight">
      <span class="class-glyph">K</span>
      <strong>Knight</strong>
      <small>swordSweep</small>
      <small id="class-knight-status" class="class-status">Selected</small>
    </button>
  
            
    <button type="button" class="class-card locked" data-testid="class-mage" disabled="">
      <span class="class-glyph">M</span>
      <strong>Mage</strong>
      <small>fireBolt</small>
      <small id="class-mage-status" class="class-status">Unlock 400g</small>
    </button>
  
            
    <button type="button" class="class-card locked" data-testid="class-priest" disabled="">
      <span class="class-glyph">P</span>
      <strong>Priest</strong>
      <small>holyBolt</small>
      <small id="class-priest-status" class="class-status">Unlock 1200g</small>
    </button>
  
          </div>
        </section>
        <section class="panel">
          <h2>Guild Upgrades</h2>
          <div class="upgrade-grid">
            <button type="button" data-testid="buy-atk" disabled="">ATK Lv.0 50g</button>
            <button type="button" data-testid="buy-hp" disabled="">HP Lv.0 50g</button>
            <button type="button" data-testid="buy-spd" disabled="">SPD Lv.0 80g</button>
            <button type="button" data-testid="buy-luck" disabled="">LUCK Lv.0 100g</button>
            <button type="button" data-testid="buy-lvl" disabled="">LVL Lv.0 200g</button>
          </div>
        </section>
      </main>
      <footer class="actions">
        <button type="button" class="primary" data-testid="deploy-solo">DEPLOY SOLO</button>
        <button type="button" data-testid="deploy-arena">DEPLOY ARENA</button>
        <button type="button" data-testid="toggle-autorun" aria-pressed="false">AUTO-RUN OFF</button>
      </footer>
    </section>
    <section id="screen-run" class="screen hidden">
      <div class="run-shell">
        <canvas id="run-canvas" width="960" height="540" aria-label="Ghost Guild run"></canvas>
        <div id="arena-offline-badge" class="offline-badge hidden" data-testid="arena-offline-badge">OFFLINE MATCH</div>
        <div class="hud">
          <span>HP <strong id="hud-hp">0</strong></span>
          <span>LV <strong id="hud-level">1</strong></span>
          <span>KILLS <strong id="hud-kills">0</strong></span>
          <span>TIME <strong id="hud-time">0s</strong></span>
        </div>
        <div id="game-state" class="mirror" hidden=""></div>
      </div>
    </section>
    <section id="screen-results" class="screen hidden">
      <div class="results-panel">
        <p class="eyebrow">RESULTS</p>
        <h1>Run Complete</h1>
        <dl class="result-grid">
          <div><dt>Score</dt><dd id="result-score" data-testid="result-score">0</dd></div>
          <div><dt>Rank</dt><dd id="result-rank" data-testid="result-rank">1</dd></div>
          <div><dt>Kills</dt><dd id="result-kills" data-testid="result-kills">0</dd></div>
          <div><dt>Time</dt><dd id="result-time" data-testid="result-time">0s</dd></div>
          <div><dt>Gold</dt><dd id="result-gold-earned" data-testid="result-gold-earned">0</dd></div>
        </dl>
        <h2>Match Ranking</h2>
        <ol id="result-ranking" data-testid="result-ranking"></ol>
        <section id="leaderboard-section" class="leaderboard-panel">
          <h2>World Leaderboard</h2>
          <ol id="leaderboard-list" data-testid="leaderboard-list"></ol>
        </section>
        <button type="button" class="primary" data-testid="back-to-guild">BACK TO GUILD</button>
      </div>
    </section>
  </div>
  

</body></html>
